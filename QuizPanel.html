        }
     .house-shape {
    width: 25px;
    height: 20px;
    background: whitesmoke;
    border-radius: 2px;
    
    /* Position it in the Top Right */
    position: fixed; 
    top: 25px;      /* Distance from top */
    right: 25px;    /* Distance from right */
    
    z-index: 100;   /* Keeps it above all other layers */
    cursor: pointer;
    transition: transform 0.3s ease;
}

/* Your roof code stays the same */
.house-shape::before {
    content: '';
    position: absolute;
    top: -10px;
    left: -1px;
    width: 0;
    height: 0;
    border-left: 13px solid transparent;
    border-right: 13px solid transparent;
    border-bottom: 11px solid whitesmoke;
}

.house-shape:hover {
    transform: scale(1.2);
}

        .option-btn:hover { background-color: #2980b9; transform: scale(1.02); }

        .submit-btn { background-color: #27ae60 !important; font-weight: bold; margin-top: 20px; }

        .star-container { margin: 18px 0; height: 65px; }
        .star { font-size: 70px; color: #333; display: inline-block; opacity: 0; transform: scale(0); margin: 0 5px; }
        .star.animate { animation: popIn 0.5s forwards; }
        .star.glow { color: #f1c40f; text-shadow: 0 0 20px #f1c40f; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

    let currentQ = 0;
    let score = 0;
    let timeLeft = 300;
    let timerInterval;
    let selectedIdx = null;
    let userAnswers = [];

    function StartQuiz() {
        const params = new URLSearchParams(window.location.search);
        const age = params.get('age') || 'junior';
        const sub = params.get('subject') || 'GK';
        activeQuestions = (questions[age] && questions[age][sub]) ? questions[age][sub] : [];
        if (activeQuestions.length > 0) { loadQuestion(); startTimer(); }
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (timeLeft <= 0) { showResult(); return; }
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }, 1000);
    }

    function loadQuestion() {
        selectedIdx = null;
        const data = activeQuestions[currentQ];
        document.getElementById('qs-content').innerText = `Question ${currentQ + 1} of ${activeQuestions.length}`;
        document.querySelector('.qs-text').innerText = data.q;
        const div = document.getElementById('options');
        div.innerHTML = "";
        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => {  selectOption(btn, i); };
            div.appendChild(btn);
        });
    }

    function selectOption(btn, i) {
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedIdx = i;
    }

    function submitAnswer() {
        if (selectedIdx === null) { alert("Select an option!"); return; }
        const correct = activeQuestions[currentQ].a;
        if (selectedIdx === correct) { score++; }
        userAnswers.push({
            q: activeQuestions[currentQ].q,
            user: activeQuestions[currentQ].o[selectedIdx],
            correct: activeQuestions[currentQ].o[correct],
            isRight: selectedIdx === correct
        });
        currentQ++;
        if (currentQ < activeQuestions.length) loadQuestion(); else showResult();
    }

    function showResult() {
        clearInterval(timerInterval);
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Score: ${score}/${activeQuestions.length}`;
        document.getElementById('review-list').innerHTML = userAnswers.map((ans, i) => `
            <div style="margin-bottom:10px; border-bottom:1px solid #666; padding-bottom: 5px;">
                <strong>Q${i+1}:</strong> ${ans.q}<br>
                <span style="color:${ans.isRight ? '#2ecc71' : '#e74c3c'}">
                    ${ans.isRight ? '✓ Correct' : '✗ Picked: '+ans.user+' | Ans: '+ans.correct}
                </span>
            </div>`).join('');
        revealStars();
    }

    function revealStars() {
        const starIds = ['star1', 'star2', 'star3'];
        starIds.forEach((id, i) => {
            setTimeout(() => {
                const s = document.getElementById(id);
                s.classList.add('animate');
                let glow = (i===0 && score>0) || (i===1 && score >= activeQuestions.length/2) || (i===2 && score === activeQuestions.length);
                if (glow) { s.classList.add('glow');  }
            }, i * 600);
        });
    }

    function toggleReview() {
        const list = document.getElementById('review-list');
        list.classList.toggle('hidden');
      
    }
    function changeSubject() {
    const params = new URLSearchParams(window.location.search);
   
    const ageGroup = params.get('age'); 
    if (ageGroup) {
        window.location.href = "subjects.html?group=" + ageGroup;
    } else {
        window.location.href = "age.html";
    }
}
window.addEventListener('load', function() {
        const displayName = document.getElementById('display-name');
        const savedName = localStorage.getItem('quizUserName');

        if (savedName && displayName) {
            displayName.innerText = savedName;
        }

   });
    window.onload = StartQuiz;
</script>
